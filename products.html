    <section class="products-section">
        <div class="section-header">
            <h1>STM32 商品专区</h1>
            <p>点击商品查看详情并购买</p>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜索商品..." class="search-input">
            <button id="searchBtn" class="search-btn">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <div class="product-tabs" id="categoryTabs">
            <button class="tab-btn active" data-tab="all">全部商品</button>
        </div>
        
        <div class="products-grid" id="productsGrid">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <span>加载中...</span>
            </div>
        </div>

        <div class="purchase-guide">
            <h3>购买方式</h3>
            <div class="payment-methods">
                <a href="https://m.tb.cn/h.R0R4hXY?tk=jzLU5KBWe9G" target="_blank" class="payment-card">
                    <i class="fas fa-shopping-bag"></i>

                </a>

            </div>

    <footer class="footer">

            <div class="footer-links">
                <a href="index.html">首页</a>
                <a href="products.html">商品</a>
                <a href="blog.html">博客</a>

                <a href="contact.html">联系</a>
            </div>
            <div class="footer-social">
                <a href="https://v.douyin.com/R51_hla2zOA/" target="_blank" rel="noopener noreferrer"><i class="fab fa-tiktok"></i></a>

                <a href="https://m.tb.cn/h.R0R4hXY?tk=jzLU5KBWe9G" target="_blank" rel="noopener noreferrer"><i class="fas fa-shopping-bag"></i></a>

        </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadCategories();
            loadProducts();

            document.getElementById('searchBtn').addEventListener('click', searchProducts);
            document.getElementById('searchInput').addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    searchProducts();
                }
            });
        });

        async function loadCategories() {
            try {
                const response = await fetch('http://localhost:3001/api/categories');
                const categories = await response.json();
                const tabsContainer = document.getElementById('categoryTabs');
                
                tabsContainer.innerHTML = '';
                
                categories.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'tab-btn' + (cat.id === 'all' ? ' active' : '');
                    btn.dataset.tab = cat.id;
                    btn.innerHTML = `<i class="fas ${cat.icon}"></i> ${cat.name}`;
                    btn.addEventListener('click', () => filterByCategory(cat.id));
                    tabsContainer.appendChild(btn);
                });
            } catch (error) {
                console.log('加载分类失败:', error);
            }
        }

        async function loadProducts(category = 'all', keyword = '') {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><span>加载中...</span></div>';

            try {
                let url = 'http://localhost:3001/api/products';
                const params = [];
                if (category && category !== 'all') params.push(`category=${category}`);
                if (keyword) params.push(`keyword=${encodeURIComponent(keyword)}`);
                if (params.length > 0) url += '?' + params.join('&');

                const response = await fetch(url);
                const products = await response.json();
                
                if (products.length === 0) {
                    grid.innerHTML = '<div class="no-products"><i class="fas fa-search"></i><p>暂无匹配的商品</p></div>';
                    return;
                }

                grid.innerHTML = products.map(product => `
                    <div class="product-card" data-category="${product.category}">
                        <div class="product-image">
                            <img src="${product.image}" alt="${product.name}">
                            ${product.isHot ? '<div class="product-badge hot">热销</div>' : ''}
                        </div>
                        <div class="product-info">
                            <h3 class="product-title">${product.name}</h3>
                            <p class="product-desc">${product.description}</p>
                            <div class="product-price-row">
                                <span class="product-price">¥${product.price}</span>
                                ${product.originalPrice > product.price ? `<span class="product-original-price">¥${product.originalPrice}</span>` : ''}
                            </div>
                            <div class="product-meta">
                                <span>库存: ${product.stock}</span>
                                <span>已售: ${product.sold}</span>
                            </div>
                            <button class="btn btn-primary btn-buy" data-product="${product.name} - ¥${product.price}">立即购买</button>
                        </div>
                    </div>
                `).join('');

                document.querySelectorAll('.btn-buy').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const productName = this.getAttribute('data-product');
                        alert('已选择：' + productName + '\n\n请通过以下方式购买：\n1. 点击闲鱼链接购买\n2. 添加微信：li28430132\n3. 电话联系：16627878630');
                    });
                });
            } catch (error) {
                console.log('加载商品失败:', error);
                grid.innerHTML = '<div class="no-products"><i class="fas fa-server"></i><p>无法连接服务器</p></div>';
            }
        }

        function filterByCategory(category) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-tab="${category}"]`).classList.add('active');
            
            const keyword = document.getElementById('searchInput').value;
            loadProducts(category, keyword);
        }

        function searchProducts() {
            const keyword = document.getElementById('searchInput').value;
            const activeCategory = document.querySelector('.tab-btn.active').dataset.tab;
            loadProducts(activeCategory, keyword);
        }
    </script>
</body>
</html>
